<!DOCTYPE html>
<html lang="uk" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облік ЗІП: Механік</title>
    
    <link rel="manifest" id="manifest-link">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Облік ЗІП">
    <link rel="apple-touch-icon" href="https://foodline-production.com/wp-content/uploads/2021/10/3752781497_3752781497.webp">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Конфігурація Tailwind для правильної роботи темної теми за класом (а не за налаштуваннями ОС)
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        /* Base Variables for Theming */
        :root {
            --bg-color: #f8fafc;
            --card-bg-color: #ffffff;
            --text-color: #1e293b;
            --text-muted-color: #64748b;
            --item-bg-color: #f1f5f9;
            --item-hover-bg-color: #e2e8f0;
            --border-color: #e2e8f0;
            --active-btn-bg: #10b981;
            --active-btn-text: #ffffff;
            --error-btn-bg: #ef4444;
            --warning-bg: #fef3c7;
            --warning-border: #f59e0b;
        }

        .dark {
            --bg-color: #1e293b;
            --card-bg-color: #334155;
            --text-color: #f1f5f9;
            --text-muted-color: #94a3b8;
            --item-bg-color: #475569;
            --item-hover-bg-color: #64748b;
            --border-color: #475569;
            --warning-bg: rgba(245, 158, 11, 0.2);
            --warning-border: #d97706;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 2rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .card { background-color: var(--card-bg-color); }
        .text-muted { color: var(--text-muted-color); }

        .inventory-item, .category-card {
            background-color: var(--item-bg-color);
            border: 1px solid var(--border-color);
            transition: transform 0.1s ease, box-shadow 0.2s ease, background-color 0.2s;
        }
        
        .inventory-item:active, .category-card:active {
            transform: scale(0.98);
        }

        .category-card:hover {
            background-color: var(--item-hover-bg-color);
        }

        .low-stock {
            border-left: 4px solid var(--error-btn-bg);
            background-color: var(--warning-bg);
        }

        .modal-overlay { background-color: rgba(0, 0, 0, 0.6); z-index: 1000; backdrop-filter: blur(2px); }
        .modal-content { z-index: 1001; }
        
        input[type="number"], input[type="text"], input[type="date"] {
            background-color: var(--card-bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        /* Network Status Indicator */
        .network-status {
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.8);
            padding: 4px 10px;
            border-radius: 12px;
            backdrop-filter: blur(2px);
            margin-top: 0.5rem;
            margin-left: auto;
            width: fit-content;
        }
        .dark .network-status { background: rgba(0,0,0,0.3); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
        .status-dot.online { background: #10b981; }
        .status-dot.offline { background: #ef4444; }
        .status-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Loader */
        .loader {
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--active-btn-bg);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-sans">

    <script>
        const manifest = {
            "name": "Облік ЗІП",
            "short_name": "ЗІП Механік",
            "description": "Додаток для реєстрації використання запчастин",

            "background_color": "#f8fafc",
            "theme_color": "#10b981"

        document.getElementById('manifest-link').href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
    </script>

    <div class="container mx-auto max-w-3xl p-4 sm:p-6 relative">
        <header class="relative text-center mb-6">
            <div class="absolute top-0 left-0 text-center">
                <button onclick="fetchData()" class="inline-block p-2 rounded-full text-muted transition-colors focus:outline-none focus:ring-2 focus:ring-emerald-500" title="Оновити дані">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>

            <img src="https://foodline-production.com/wp-content/uploads/2021/10/3752781497_3752781497.webp" alt="Foodline Logo" class="w-16 h-auto mx-auto mb-2 rounded-lg" onerror="this.style.display='none'">

        <!-- Вибір механіка -->

            <label for="employeeSelect" class="block text-sm font-bold mb-2">Механік (Хто взяв деталь?):</label>

                <option value="">-- Оберіть зі списку --</option>

        <!-- Пошук -->
        <div class="mb-6">

                    <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <input type="text" id="searchInput" placeholder="Пошук (модель, обладнання, номер)..." class="block w-full pl-10 pr-10 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 card text-lg shadow-sm">
                <button id="clearSearchBtn" class="absolute inset-y-0 right-0 pr-3 flex items-center hidden text-gray-400 hover:text-gray-600">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>

        <!-- Статус завантаження -->

        <!-- В'ю: Список деталей всередині категорії або результати пошуку -->

    <!-- Модальне вікно внесення використання -->

                <div class="bg-gray-100 dark:bg-slate-700 p-3 rounded-lg flex justify-between items-center mb-6 border border-gray-200 dark:border-slate-600">

                        <svg class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>

    <!-- Кастомний Alert -->
    <div id="customDialogOverlay" class="fixed inset-0 hidden items-center justify-center modal-overlay z-[2000] p-4">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl w-full max-w-sm p-6 text-center transform transition-all">
            <h3 id="customDialogMessage" class="text-lg font-bold mb-6 text-slate-800 dark:text-white whitespace-pre-wrap"></h3>
            <div class="flex justify-center gap-3" id="customDialogButtons"></div>
        </div>
    </div>

    <script>
        // --- НАЛАШТУВАННЯ ---
        // Оновлений URL Google Script
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzGmeoN4wVy6e9LoWTSzy4ZDP_nmZlvHXDW5oYHxBpiNrLsioRDWptQ-LSSAVug3LRh/exec'; 

        // Тестові дані з імітацією структури кількох аркушів (Fallback)
        const MOCK_DATA = [
            {
                name: "Підшипники",
                items: [
                    { sheetName: "Підшипники", row: 4, no: "1", model: "6200-2RSH", equipment: "Twist off-натяжні ролики ременів", minStock: 10, currentStock: 18 },
                    { sheetName: "Підшипники", row: 5, no: "2", model: "6201-2Z", equipment: "Електро пила", minStock: 2, currentStock: 2 },
                    { sheetName: "Підшипники", row: 6, no: "3", model: "608-2RSH", equipment: "ПакТех-направляючі", minStock: 2, currentStock: 2 },
                    { sheetName: "Підшипники", row: 7, no: "4", model: "6202-2RS", equipment: "Електродвигун", minStock: 4, currentStock: 15 },
                    { sheetName: "Підшипники", row: 17, no: "14", model: "6205-DDU", equipment: "Вихідна зірочка дозатора", minStock: 2, currentStock: 5 },
                    { sheetName: "Підшипники", row: 19, no: "16", model: "UC 204", equipment: "Конвеєри", minStock: 2, currentStock: 5 }
                ]
            },
            {
                name: "Сальники та Кільця",
                items: [
                    { sheetName: "Сальники та Кільця", row: 4, no: "1", model: "Манжета 25х47х7", equipment: "Насоси", minStock: 5, currentStock: 8 },
                    { sheetName: "Сальники та Кільця", row: 5, no: "2", model: "Кільце O-ring 50x3", equipment: "Трубопроводи", minStock: 10, currentStock: 3 }
                ]
            },
            {
                name: "Електричні запчастини",
                items: [
                    { sheetName: "Електричні запчастини", row: 4, no: "1", model: "Реле Finder 24V", equipment: "Шафи керування", minStock: 3, currentStock: 5 },
                    { sheetName: "Електричні запчастини", row: 5, no: "2", model: "Датчик індуктивний M12", equipment: "Етикетувальник", minStock: 2, currentStock: 1 }
                ]
            }
        ];

        let allData = []; // Структура: [{name: 'Категорія', items: [{...}]}]
        let appState = {
            view: 'categories', // 'categories' або 'items'
            activeCategory: null
        };
        let currentSelectedItem = null;
        const OFFLINE_KEY = 'zipOfflineQueueV2';
        const CACHE_KEY = 'zipInventoryCacheV2';

        // --- Custom Dialog System ---
        const showCustomDialog = (message, isConfirm = false) => {
            return new Promise((resolve) => {
                const overlay = document.getElementById('customDialogOverlay');
                const msgEl = document.getElementById('customDialogMessage');
                const btnsEl = document.getElementById('customDialogButtons');

                msgEl.textContent = message;
                btnsEl.innerHTML = '';

                const closeDialog = () => {
                    overlay.classList.add('hidden');
                    overlay.classList.remove('flex');
                };

                if (isConfirm) {
                    const btnCancel = document.createElement('button');
                    btnCancel.className = 'px-4 py-2 bg-gray-200 dark:bg-slate-700 text-gray-800 dark:text-white rounded-lg font-semibold hover:bg-gray-300 dark:hover:bg-slate-600 transition-colors';
                    btnCancel.textContent = 'Скасувати';
                    btnCancel.onclick = () => { closeDialog(); resolve(false); };

                    const btnOk = document.createElement('button');
                    btnOk.className = 'px-4 py-2 bg-emerald-500 text-white rounded-lg font-semibold hover:bg-emerald-600 transition-colors shadow-md';
                    btnOk.textContent = 'Підтвердити';
                    btnOk.onclick = () => { closeDialog(); resolve(true); };

                    btnsEl.appendChild(btnCancel);
                    btnsEl.appendChild(btnOk);
                } else {
                    const btnOk = document.createElement('button');
                    btnOk.className = 'px-6 py-2 bg-emerald-500 text-white rounded-lg font-semibold hover:bg-emerald-600 transition-colors shadow-md';
                    btnOk.textContent = 'Зрозуміло';
                    btnOk.onclick = () => { closeDialog(); resolve(true); };
                    btnsEl.appendChild(btnOk);
                }

                overlay.classList.remove('hidden');
                overlay.classList.add('flex');
            });
        };

        const customAlert = (msg) => showCustomDialog(msg, false);

        // --- Мережа та Офлайн ---
        const updateNetworkStatus = () => {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const queue = JSON.parse(localStorage.getItem(OFFLINE_KEY) || '[]');
            
            if (!navigator.onLine) {
                dot.className = 'status-dot offline';
                text.textContent = `Офлайн (${queue.length})`;
            } else if (queue.length > 0) {
                dot.className = 'status-dot offline';
                text.textContent = `Черга (${queue.length})`;
            } else {
                dot.className = 'status-dot online';
                text.textContent = 'Онлайн';
            }
        };

        const saveToOfflineQueue = (data) => {
            const queue = JSON.parse(localStorage.getItem(OFFLINE_KEY) || '[]');
            queue.push(data);
            localStorage.setItem(OFFLINE_KEY, JSON.stringify(queue));
            updateNetworkStatus();
        };

        const processOfflineQueue = async () => {
            const queue = JSON.parse(localStorage.getItem(OFFLINE_KEY) || '[]');
            if (queue.length === 0 || !navigator.onLine) return;

            const statusDot = document.getElementById('statusDot');
            statusDot.className = 'status-dot syncing';
            document.getElementById('statusText').textContent = 'Синхронізація...';

            const newQueue = [];
            for (const item of queue) {
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(item)
                    });
                } catch (e) {
                    newQueue.push(item);
                }
            }

            localStorage.setItem(OFFLINE_KEY, JSON.stringify(newQueue));
            updateNetworkStatus();
            
            if (newQueue.length === 0) {
                fetchData(true);
            }
        };

        // --- Отримання даних ---
        const fetchData = async (silent = false) => {
            const loader = document.getElementById('loadingState');
            if (!silent) {
                document.getElementById('categoriesView').classList.add('hidden');
                document.getElementById('itemsView').classList.add('hidden');
                loader.classList.remove('hidden');
            }

            try {
                if (!navigator.onLine) {
                    const cached = localStorage.getItem(CACHE_KEY);
                    if (cached) {
                        allData = JSON.parse(cached);
                        renderState();
                        if(!silent) customAlert("Відсутній інтернет. Показано збережені дані.");
                    } else if(!silent) {
                        customAlert("Немає інтернет-з'єднання для завантаження бази.");
                    }
                    loader.classList.add('hidden');
                    return;
                }

                const response = await fetch(GOOGLE_SCRIPT_URL + "?action=getInventory");
                const data = await response.json();
                
                if (data && data.success) {
                    allData = data.categories;
                    localStorage.setItem(CACHE_KEY, JSON.stringify(allData));
                    renderState();
                } else {
                    throw new Error("Помилка формату даних");
                }
            } catch (error) {
                console.error("Fetch error:", error);
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    allData = JSON.parse(cached);
                } else {
                    allData = MOCK_DATA; // Fallback to mock
                }
                renderState();
            } finally {
                loader.classList.add('hidden');
            }
        };

        // --- Рендеринг (Відображення) ---
        const renderState = () => {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            
            const catView = document.getElementById('categoriesView');
            const itemsViewEl = document.getElementById('itemsView');
            const titleEl = document.getElementById('currentCategoryTitle');
            const backBtnContainer = document.getElementById('backBtnContainer');

            // Якщо є пошук, шукаємо по всіх категоріях
            if (searchTerm) {
                catView.classList.add('hidden');
                itemsViewEl.classList.remove('hidden');
                titleEl.textContent = 'Результати пошуку';
                backBtnContainer.classList.add('hidden'); // Назад не працює при пошуку (кнопка "Х" в інпуті скине пошук)
                
                const allItems = allData.flatMap(c => c.items);
                const filtered = allItems.filter(item => 
                    (item.model && item.model.toLowerCase().includes(searchTerm)) || 
                    (item.equipment && item.equipment.toLowerCase().includes(searchTerm)) ||
                    (item.no && String(item.no).toLowerCase().includes(searchTerm))
                );
                
                renderItemsList(filtered, true); // true = показувати бейдж категорії
                return;
            }

            // Звичайний режим
            if (appState.view === 'categories') {
                catView.classList.remove('hidden');
                itemsViewEl.classList.add('hidden');
                renderCategoriesGrid();
            } else if (appState.view === 'items') {
                catView.classList.add('hidden');
                itemsViewEl.classList.remove('hidden');
                backBtnContainer.classList.remove('hidden');
                
                const categoryData = allData.find(c => c.name === appState.activeCategory);
                if(categoryData) {
                    titleEl.textContent = categoryData.name;
                    renderItemsList(categoryData.items, false);
                } else {
                    appState.view = 'categories';
                    renderState();
                }
            }
        };

        const renderCategoriesGrid = () => {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';
            
            if (allData.length === 0) {
                container.innerHTML = '<p class="text-center w-full text-muted py-8 col-span-full">База порожня</p>';
                return;
            }

            allData.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'category-card p-5 rounded-2xl shadow-sm hover:shadow-md text-left flex flex-col justify-between group h-full border border-gray-200 dark:border-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500';
                btn.onclick = () => {
                    appState.view = 'items';
                    appState.activeCategory = category.name;
                    renderState();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                btn.innerHTML = `
                    <div class="flex justify-between items-start w-full">
                        <span class="font-bold text-lg text-gray-800 dark:text-white leading-tight pr-2">${category.name}</span>
                        <svg class="h-6 w-6 text-gray-400 group-hover:text-emerald-500 transition-colors flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </div>
                    <div class="mt-4">
                        <span class="bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-800 px-3 py-1 rounded-full text-sm font-semibold transition-colors shadow-sm inline-block">
                            ${category.items.length} позицій
                        </span>
                    </div>
                `;
                container.appendChild(btn);
            });
        };

        const renderItemsList = (items, showCategoryBadge) => {
            const container = document.getElementById('inventoryContainer');
            container.innerHTML = '';

            if (items.length === 0) {
                container.innerHTML = '<p class="text-center w-full text-muted py-8 col-span-full">Нічого не знайдено</p>';
                return;
            }

            items.forEach(item => {
                const isLowStock = parseFloat(item.currentStock) <= parseFloat(item.minStock);
                
                const card = document.createElement('div');
                card.className = `inventory-item p-4 rounded-xl cursor-pointer flex flex-col justify-between ${isLowStock ? 'low-stock' : ''}`;
                card.onclick = () => openUsageModal(item);

                card.innerHTML = `
                    <div>
                        <div class="flex items-start justify-between mb-1">
                            <h3 class="font-bold text-lg leading-tight text-emerald-700 dark:text-emerald-400 pr-2">
                                <span class="bg-gray-200 dark:bg-slate-700 text-gray-800 dark:text-gray-300 text-xs px-2 py-0.5 rounded mr-2 align-middle">№ ${item.no}</span>
                                <span class="align-middle">${item.model}</span>
                            </h3>
                        </div>
                        ${showCategoryBadge ? `<p class="text-xs text-emerald-600 dark:text-emerald-400 mb-2 font-bold inline-block bg-emerald-50 dark:bg-emerald-900/40 px-2 py-0.5 rounded">${item.sheetName}</p>` : ''}
                        <p class="text-sm text-muted mb-3 line-clamp-2 mt-1" title="${item.equipment}">
                            <span class="font-medium">Обладнання:</span> ${item.equipment}
                        </p>
                    </div>
                    <div class="flex justify-between items-end mt-auto pt-2 border-t border-gray-200 dark:border-slate-600 border-opacity-50">
                        <div class="text-xs text-muted">
                            Мін. запас: <span class="font-semibold text-gray-700 dark:text-gray-300">${item.minStock}</span>
                        </div>
                        <div class="text-sm text-right">
                            Залишок: <span class="font-bold text-lg ${isLowStock ? 'text-red-500' : 'text-gray-900 dark:text-white'}">${item.currentStock}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        };

        // --- Логіка пошуку та переходів ---
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearchBtn');

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value;
            clearBtn.classList.toggle('hidden', val.length === 0);
            renderState();
        });

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.classList.add('hidden');
            renderState(); // Поверне до попереднього екрану (категорій або відкритої категорії)
        });

        document.getElementById('backToCategoriesBtn').addEventListener('click', () => {
            appState.view = 'categories';
            appState.activeCategory = null;
            renderState();
        });

        // --- Модальне вікно ---
        const modal = document.getElementById('usageModal');
        const modalContent = document.getElementById('usageModalContent');

        const openUsageModal = (item) => {
            const mechanic = document.getElementById('employeeSelect').value;
            if (!mechanic) {
                customAlert("Будь ласка, оберіть ваше ім'я у списку зверху!");
                document.getElementById('employeeSelect').focus();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            currentSelectedItem = item;
            
            document.getElementById('modalPartNo').textContent = `№ ${item.no}`;
            document.getElementById('modalPartCategory').textContent = item.sheetName;
            document.getElementById('modalPartName').textContent = item.model;
            document.getElementById('modalPartEquipment').textContent = item.equipment;
            document.getElementById('modalCurrentStock').textContent = `${item.currentStock} шт`;
            
            document.getElementById('useQuantity').value = 1;
            document.getElementById('useLocation').value = item.equipment; // Дефолт
            document.getElementById('useDate').value = new Date().toISOString().split('T')[0];

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => { modalContent.classList.remove('translate-y-full'); }, 10);
        };

        const closeUsageModal = () => {
            modalContent.classList.add('translate-y-full');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                currentSelectedItem = null;
            }, 300);
        };

        document.getElementById('closeUsageModalBtn').addEventListener('click', closeUsageModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeUsageModal(); });

        // --- Відправка даних ---
        document.getElementById('submitUsageBtn').addEventListener('click', async () => {
            if (!currentSelectedItem) return;

            const mechanic = document.getElementById('employeeSelect').value;
            const quantity = parseFloat(document.getElementById('useQuantity').value);
            const location = document.getElementById('useLocation').value.trim();
            const date = document.getElementById('useDate').value;

            if (!quantity || quantity <= 0) { customAlert("Введіть коректну кількість!"); return; }
            if (!location) { customAlert("Вкажіть, де була використана деталь!"); return; }

            const currentStock = parseFloat(currentSelectedItem.currentStock);
            if (quantity > currentStock) {
                const confirmOver = await showCustomDialog(`Увага!\nВи списуєте ${quantity} шт, але в залишку лише ${currentStock} шт. Продовжити?`, true);
                if (!confirmOver) return;
            }

            const payload = {
                action: "registerUsage",
                sheetName: currentSelectedItem.sheetName, // ВАЖЛИВО! Передаємо назву аркуша
                row: currentSelectedItem.row,
                model: currentSelectedItem.model,
                mechanic: mechanic,
                quantity: quantity,
                location: location,
                date: date,
                timestamp: new Date().toISOString()
            };

            const btn = document.getElementById('submitUsageBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="loader w-5 h-5 mr-2 border-white border-top-transparent"></div> Зачекайте...';
            btn.disabled = true;

            try {
                if (!navigator.onLine) {
                    throw new Error("Offline");
                }

                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                showSuccessAndClose();
            } catch (e) {
                saveToOfflineQueue(payload);
                showSuccessAndClose(true);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        const showSuccessAndClose = (isOffline = false) => {
            // Оновлюємо локальні дані, щоб одразу бачити зміни
            if (currentSelectedItem) {
                const qty = parseFloat(document.getElementById('useQuantity').value);
                
                // Знаходимо категорію та елемент в ній
                const categoryData = allData.find(c => c.name === currentSelectedItem.sheetName);
                if (categoryData) {
                    const itemInArray = categoryData.items.find(i => i.row === currentSelectedItem.row);
                    if (itemInArray) {
                        itemInArray.currentStock = (parseFloat(itemInArray.currentStock) - qty).toString();
                    }
                }
                localStorage.setItem(CACHE_KEY, JSON.stringify(allData));
                renderState();
            }

            closeUsageModal();
            
            if (isOffline) {
                customAlert("Відсутній зв'язок.\nЗапис збережено в телефоні і буде відправлено автоматично при появі інтернету!");
            } else {
                const toast = document.createElement('div');
                toast.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg z-[3000] font-bold text-sm flex items-center transition-opacity duration-300';
                toast.innerHTML = '<svg class="w-5 h-5 text-emerald-400 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Успішно списано!';
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 2000);
            }
        };

        // --- Ініціалізація ---
        document.addEventListener('DOMContentLoaded', () => {
            updateNetworkStatus();
            
            const savedMechanic = localStorage.getItem('selectedMechanic');
            if(savedMechanic) document.getElementById('employeeSelect').value = savedMechanic;
            document.getElementById('employeeSelect').addEventListener('change', (e) => {
                localStorage.setItem('selectedMechanic', e.target.value);
            });

            window.addEventListener('online', () => { updateNetworkStatus(); processOfflineQueue(); });
            window.addEventListener('offline', updateNetworkStatus);
            document.getElementById('networkStatusBtn').addEventListener('click', processOfflineQueue);

            fetchData();
        });
    </script>
</body>
</html>
